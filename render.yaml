services:
  - type: web
    name: plan-system-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        value: https://z32uxcqxkipwa.ok.kimi.link
      - key: ALLOWED_ORIGINS
        value: https://z32uxcqxkipwa.ok.kimi.link
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
